openapi: 3.0.3
info:
  title: NQOBILE Reconciliation Service Microservice
  description: "Continuous validation bridging custodian bank flows, off-chain accounting database ledgers, and on-chain asset registers."
  version: 2.0.0
paths:
  /v1/reconciliation/process-statement:
    post:
      summary: Ingest and parse statement datasets from custodian banks
      operationId: processBankStatement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankStatementPayload'
      responses:
        '200':
          description: Processing run complete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankStatementResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '500':
          $ref: '#/components/responses/500InternalError'

  /v1/reconciliation/audit-chain-sync:
    post:
      summary: "Run delta evaluations between system database ledger and Polygon contract states"
      operationId: auditChainSync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tokenId]
              properties:
                tokenId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Ledger delta run completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChainSyncResponse'
        '500':
          $ref: '#/components/responses/500InternalError'

  /v1/reconciliation/breaks/{breakId}/resolve:
    post:
      summary: "Resolve ledger exceptions under four-eyes control validation rules"
      operationId: resolveBreak
      parameters:
        - name: breakId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BreakResolutionRequest'
      responses:
        '200':
          description: Exception settled and balancing entries logged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakResolutionResponse'
        '404':
          $ref: '#/components/responses/404NotFound'
        '500':
          $ref: '#/components/responses/500InternalError'

components:
  responses:
    400BadRequest:
      description: Faulty payload data.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    404NotFound:
      description: Element identifier unknown.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    500InternalError:
      description: Processing pipeline error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    BankStatementPayload:
      type: object
      required: [statementId, custodianBank, records]
      properties:
        statementId:
          type: string
          format: uuid
        custodianBank:
          type: string
          example: "STANDARD_BANK_ZA"
        records:
          type: array
          items:
            $ref: '#/components/schemas/BankStatementRecord'

    BankStatementRecord:
      type: object
      required: [paymentReference, amountUSD, timestamp]
      properties:
        paymentReference:
          type: string
          example: "NQB-90928A"
        amountUSD:
          type: number
          example: 5000.00
        timestamp:
          type: string
          format: date-time

    BankStatementResponse:
      type: object
      required: [matchedCount, unmatchedCount, quarantinedCount]
      properties:
        matchedCount:
          type: integer
          example: 142
        unmatchedCount:
          type: integer
          example: 3
        quarantinedCount:
          type: integer
          example: 1

    ChainSyncResponse:
      type: object
      required: [reconciled, varianceCount, variances, platformHalted]
      properties:
        reconciled:
          type: boolean
          description: Absolute status agreement confirmation flag.
        varianceCount:
          type: integer
          example: 0
        variances:
          type: array
          items:
            $ref: '#/components/schemas/LedgerVariance'
        platformHalted:
          type: boolean
          description: "Automated system breaker state flag. True triggers an operations freeze."

    LedgerVariance:
      type: object
      properties:
        walletAddress:
          type: string
          example: "0x9cc3...5a21"
        chainBalance:
          type: number
          example: 100.00
        databaseBalance:
          type: number
          example: 105.00

    BreakResolutionRequest:
      type: object
      required: [resolutionAction, adjustments, authorizedBy]
      properties:
        resolutionAction:
          type: string
          enum: [ADJUST_OFFCHAIN_LEDGER, FORCE_ONCHAIN_ADJUSTMENT, REFUND_UNMATCHED_FUNDS]
        adjustments:
          type: string
          example: "Adjusted database ledger balance by +5 units to clear ledger variance."
        authorizedBy:
          type: string
          example: "FIN-CONTROLLER-09"

    BreakResolutionResponse:
      type: object
      required: [breakId, resolved, resolvedAt]
      properties:
        breakId:
          type: string
          format: uuid
        resolved:
          type: boolean
        resolvedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "LEDGER_MUTATION_DENIED"
        message:
          type: string
          example: "Cannot mutate an open ledger state without an authorized supervisor signature."